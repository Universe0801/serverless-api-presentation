<svg width="1920" height="800" viewBox="0 0 1920 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC"/>
      <stop offset="100%" style="stop-color:#E2E8F0"/>
    </linearGradient>
    
    <!-- AWS Service Gradients -->
    <linearGradient id="apiGatewayGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8BC34A"/>
      <stop offset="100%" style="stop-color:#759C3E"/>
    </linearGradient>
    
    <linearGradient id="lambdaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB74D"/>
      <stop offset="100%" style="stop-color:#FF9900"/>
    </linearGradient>
    
    <linearGradient id="dynamoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#64B5F6"/>
      <stop offset="100%" style="stop-color:#3498DB"/>
    </linearGradient>
    
    <linearGradient id="cloudwatchGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EF5350"/>
      <stop offset="100%" style="stop-color:#D13212"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1920" height="800" fill="url(#bgGradient)"/>
  
  <!-- Foundation Base -->
  <rect x="200" y="650" width="1520" height="100" rx="8" fill="#34495E"/>
  <text x="960" y="715" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#FFFFFF">AWS FREE TIER</text>
  
  <!-- Temple Roof -->
  <polygon points="150,200 1770,200 1720,150 200,150" fill="#2C3E50"/>
  
  <!-- Pillar 1: API Gateway -->
  <g transform="translate(300,200)">
    <!-- Pillar Column -->
    <rect x="-60" y="0" width="120" height="400" fill="url(#apiGatewayGrad)"/>
    <rect x="-70" y="0" width="140" height="50" fill="#6A9B37"/>
    <rect x="-70" y="400" width="140" height="50" fill="#6A9B37"/>
    
    <!-- API Gateway Icon -->
    <g transform="translate(0,-80)">
      <rect x="-40" y="-40" width="80" height="80" rx="8" fill="#FFFFFF"/>
      <!-- Gateway/Door Icon -->
      <rect x="-30" y="-25" width="20" height="50" rx="2" fill="#759C3E"/>
      <rect x="-5" y="-25" width="20" height="50" rx="2" fill="#759C3E"/>
      <rect x="20" y="-25" width="20" height="50" rx="2" fill="#759C3E"/>
      <!-- Arrows showing flow -->
      <polygon points="-35,-10 -25,-15 -25,-5" fill="#8BC34A"/>
      <polygon points="0,-10 10,-15 10,-5" fill="#8BC34A"/>
      <polygon points="35,-10 45,-15 45,-5" fill="#8BC34A"/>
    </g>
    
    <!-- Service Label -->
    <text x="0" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2C3E50">API GATEWAY</text>
    <text x="0" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#546E7A">La puerta de entrada</text>
    
    <!-- Features -->
    <text x="0" y="540" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#37474F">🌐 URL automática</text>
    <text x="0" y="560" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#37474F">⚡ CORS incluido</text>
  </g>
  
  <!-- Pillar 2: Lambda -->
  <g transform="translate(640,200)">
    <!-- Pillar Column -->
    <rect x="-60" y="0" width="120" height="400" fill="url(#lambdaGrad)"/>
    <rect x="-70" y="0" width="140" height="50" fill="#E67E22"/>
    <rect x="-70" y="400" width="140" height="50" fill="#E67E22"/>
    
    <!-- Lambda Icon -->
    <g transform="translate(0,-80)">
      <rect x="-40" y="-40" width="80" height="80" rx="8" fill="#FFFFFF"/>
      <!-- Lightning Bolt -->
      <polygon points="-10,-30 10,-30 0,-10 20,-10 -10,30 -5,10 -25,10" fill="#FF9900"/>
      <!-- Brain/Function representation -->
      <circle cx="0" cy="0" r="25" stroke="#FF9900" stroke-width="3" fill="none" opacity="0.3"/>
    </g>
    
    <!-- Service Label -->
    <text x="0" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2C3E50">LAMBDA</text>
    <text x="0" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#546E7A">El cerebro (Java 21)</text>
    
    <!-- Features -->
    <text x="0" y="540" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#37474F">🧠 Solo código de negocio</text>
    <text x="0" y="560" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#37474F">📈 Escalado automático</text>
  </g>
  
  <!-- Pillar 3: DynamoDB -->
  <g transform="translate(980,200)">
    <!-- Pillar Column -->
    <rect x="-60" y="0" width="120" height="400" fill="url(#dynamoGrad)"/>
    <rect x="-70" y="0" width="140" height="50" fill="#2980B9"/>
    <rect x="-70" y="400" width="140" height="50" fill="#2980B9"/>
    
    <!-- DynamoDB Icon -->
    <g transform="translate(0,-80)">
      <rect x="-40" y="-40" width="80" height="80" rx="8" fill="#FFFFFF"/>
      <!-- Database Cylinders -->
      <ellipse cx="0" cy="-20" rx="25" ry="8" fill="#3498DB"/>
      <rect x="-25" y="-20" width="50" height="16" fill="#3498DB"/>
      <ellipse cx="0" cy="-4" rx="25" ry="8" fill="#2980B9"/>
      
      <ellipse cx="0" cy="5" rx="25" ry="8" fill="#3498DB"/>
      <rect x="-25" y="5" width="50" height="16" fill="#3498DB"/>
      <ellipse cx="0" cy="21" rx="25" ry="8" fill="#2980B9"/>
    </g>
    
    <!-- Service Label -->
    <text x="0" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2C3E50">DYNAMODB</text>
    <text x="0" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#546E7A">La memoria</text>
    
    <!-- Features -->
    <text x="0" y="540" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#37474F">📊 NoSQL</text>
    <text x="0" y="560" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#37474F">💳 Pay-per-use</text>
  </g>
  
  <!-- Pillar 4: CloudWatch -->
  <g transform="translate(1320,200)">
    <!-- Pillar Column -->
    <rect x="-60" y="0" width="120" height="400" fill="url(#cloudwatchGrad)"/>
    <rect x="-70" y="0" width="140" height="50" fill="#C0392B"/>
    <rect x="-70" y="400" width="140" height="50" fill="#C0392B"/>
    
    <!-- CloudWatch Icon -->
    <g transform="translate(0,-80)">
      <rect x="-40" y="-40" width="80" height="80" rx="8" fill="#FFFFFF"/>
      <!-- Eye Icon -->
      <ellipse cx="0" cy="0" rx="30" ry="20" fill="none" stroke="#D13212" stroke-width="3"/>
      <circle cx="0" cy="0" r="12" fill="#D13212"/>
      <circle cx="3" cy="-3" r="4" fill="#FFFFFF"/>
      <!-- Monitoring waves -->
      <path d="M -35,-10 Q -25,0 -15,-10 Q -5,0 5,-10 Q 15,0 25,-10 Q 35,0 45,-10" 
            stroke="#E74C3C" stroke-width="2" fill="none" opacity="0.6"/>
    </g>
    
    <!-- Service Label -->
    <text x="0" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2C3E50">CLOUDWATCH</text>
    <text x="0" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#546E7A">Los ojos</text>
    
    <!-- Features -->
    <text x="0" y="540" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#37474F">📈 Logs y métricas</text>
    <text x="0" y="560" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#37474F">🔔 Alertas incluidas</text>
  </g>
  
  <!-- Connection Arrows -->
  <!-- API Gateway to Lambda -->
  <g stroke="#546E7A" stroke-width="3" fill="none" opacity="0.7">
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#546E7A"/>
      </marker>
    </defs>
    
    <!-- Bidirectional arrows between services -->
    <line x1="420" y1="400" x2="580" y2="400" marker-end="url(#arrowhead)"/>
    <line x1="580" y1="420" x2="420" y2="420" marker-end="url(#arrowhead)"/>
    
    <line x1="760" y1="400" x2="920" y2="400" marker-end="url(#arrowhead)"/>
    <line x1="920" y1="420" x2="760" y2="420" marker-end="url(#arrowhead)"/>
    
    <line x1="1040" y1="400" x2="1200" y2="400" marker-end="url(#arrowhead)"/>
    <line x1="1200" y1="420" x2="1040" y2="420" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Metrics Boxes -->
  <g transform="translate(1500,300)">
    <!-- Cost Box -->
    <rect x="0" y="0" width="180" height="80" rx="8" fill="#2ECC71" opacity="0.9"/>
    <text x="90" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">💰 COSTO</text>
    <text x="90" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">$0-5/mes</text>
    
    <!-- Capacity Box -->
    <rect x="0" y="100" width="180" height="80" rx="8" fill="#3498DB" opacity="0.9"/>
    <text x="90" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">⚡ CAPACIDAD</text>
    <text x="90" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">1K req/seg</text>
    
    <!-- Security Box -->
    <rect x="0" y="200" width="180" height="80" rx="8" fill="#E74C3C" opacity="0.9"/>
    <text x="90" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">🛡️ SEGURIDAD</text>
    <text x="90" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">HTTPS default</text>
  </g>
  
  <!-- Title -->
  <text x="960" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#2C3E50">
    Arquitectura MVP: Elegancia en la Simplicidad
  </text>
  
  <!-- Subtitle -->
  <text x="960" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#546E7A">
    4 pilares que sostienen el imperio serverless
  </text>
</svg>