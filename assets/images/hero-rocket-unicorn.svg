<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="spaceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1976D2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9C27B0;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Space Background -->
  <rect width="1920" height="1080" fill="url(#spaceGradient)"/>
  
  <!-- Stars -->
  <circle cx="200" cy="150" r="3" fill="#FFD700" opacity="0.7"/>
  <circle cx="400" cy="300" r="2" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="600" cy="200" r="2.5" fill="#FFD700" opacity="0.6"/>
  <circle cx="800" cy="400" r="2" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="1000" cy="100" r="3" fill="#FFD700" opacity="0.7"/>
  <circle cx="1200" cy="350" r="2" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="1400" cy="250" r="2.5" fill="#FFD700" opacity="0.6"/>
  <circle cx="1600" cy="450" r="2" fill="#FFFFFF" opacity="0.7"/>
  
  <!-- Rocket Body -->
  <g transform="translate(400,600) rotate(-45)">
    <!-- Rocket Main Body -->
    <ellipse cx="0" cy="0" rx="40" ry="120" fill="#1976D2"/>
    
    <!-- Rocket Nose -->
    <path d="M -30,-120 Q 0,-150 30,-120" fill="#FF9800"/>
    
    <!-- Rocket Fins -->
    <polygon points="-50,80 -70,120 -30,120" fill="#0D47A1"/>
    <polygon points="50,80 70,120 30,120" fill="#0D47A1"/>
    
    <!-- Rocket Windows -->
    <circle cx="-15" cy="-40" r="12" fill="#E3F2FD"/>
    <circle cx="15" cy="-40" r="12" fill="#E3F2FD"/>
    <circle cx="0" cy="20" r="15" fill="#E3F2FD"/>
    
    <!-- Engine Fire -->
    <ellipse cx="0" cy="120" rx="25" ry="40" fill="#FF5722" opacity="0.8"/>
    <ellipse cx="0" cy="130" rx="15" ry="25" fill="#FFD700" opacity="0.9"/>
  </g>
  
  <!-- Rocket Trail -->
  <g opacity="0.6">
    <circle cx="350" cy="650" r="8" fill="#FFD700"/>
    <circle cx="320" cy="680" r="6" fill="#FF9800"/>
    <circle cx="290" cy="710" r="4" fill="#FFD700"/>
    <circle cx="260" cy="740" r="3" fill="#FF9800"/>
    <circle cx="230" cy="770" r="2" fill="#FFD700"/>
    
    <circle cx="380" cy="620" r="5" fill="#FF9800"/>
    <circle cx="360" cy="640" r="3" fill="#FFD700"/>
    <circle cx="340" cy="660" r="2" fill="#FF9800"/>
  </g>
  
  <!-- Unicorn Silhouette -->
  <g transform="translate(1500,200)" fill="#FFD700" opacity="0.9">
    <!-- Unicorn Body -->
    <ellipse cx="0" cy="0" rx="80" ry="40"/>
    
    <!-- Unicorn Head -->
    <ellipse cx="-60" cy="-20" rx="30" ry="25"/>
    
    <!-- Unicorn Horn -->
    <polygon points="-75,-45 -70,-65 -65,-45" fill="#FFD700"/>
    
    <!-- Unicorn Legs -->
    <rect x="-20" y="25" width="8" height="30"/>
    <rect x="0" y="25" width="8" height="30"/>
    <rect x="20" y="25" width="8" height="30"/>
    <rect x="40" y="25" width="8" height="30"/>
    
    <!-- Unicorn Tail -->
    <path d="M 80,0 Q 120,20 100,60 Q 90,40 80,20" fill="#FFD700"/>
    
    <!-- Unicorn Mane -->
    <path d="M -60,-45 Q -40,-60 -50,-30 Q -30,-50 -40,-20" fill="#FFD700"/>
  </g>
  
  <!-- Sparkles around unicorn -->
  <g fill="#FFD700" opacity="0.8">
    <polygon points="1400,150 1405,160 1415,160 1407,167 1410,177 1400,170 1390,177 1393,167 1385,160 1395,160" transform="scale(0.8)"/>
    <polygon points="1600,180 1605,190 1615,190 1607,197 1610,207 1600,200 1590,207 1593,197 1585,190 1595,190" transform="scale(0.6)"/>
    <polygon points="1550,280 1555,290 1565,290 1557,297 1560,307 1550,300 1540,307 1543,297 1535,290 1545,290" transform="scale(0.7)"/>
  </g>
  
  <!-- More particle effects -->
  <g opacity="0.4">
    <circle cx="500" cy="500" r="3" fill="#FFD700"/>
    <circle cx="700" cy="300" r="2" fill="#FFFFFF"/>
    <circle cx="900" cy="600" r="4" fill="#FF9800"/>
    <circle cx="1100" cy="400" r="2" fill="#FFD700"/>
  </g>
</svg>